// ── TTS ─────────────────────────────────────────────────────────────────────
function useTTS() {
  const [speaking,setSpeaking]=useState(false);
  const speak=useCallback((text,lang="fr-FR",rate=0.9)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;u.volume=1;
    u.onstart=()=>setSpeaking(true);u.onend=()=>setSpeaking(false);u.onerror=()=>setSpeaking(false);
    setTimeout(()=>window.speechSynthesis.speak(u),100);
  },[]);
  const stop=useCallback(()=>{window.speechSynthesis?.cancel();setSpeaking(false);},[]);
  return{speak,stop,speaking};
}

// ── CLAUDE API ───────────────────────────────────────────────────────────────
async function askClaude(system,messages){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system,messages}),
    });
    const d=await r.json();
    return d.content?.[0]?.text||"Réessayez.";
  }catch{return"Connexion IA indisponible.";}
}

// ── BACKUP ──────────────────────────────────────────────────────────────────
function useBackup(profile,sm2){
  const [exportDone,setExportDone]=useState(false);
  const [importErr,setImportErr]=useState("");
  const [importData,setImportData]=useState(null);
  const [importPhase,setImportPhase]=useState("idle");
  const fileRef=useRef(null);

  const doExport=useCallback(()=>{
    const data={__meta:{app:"DeutschMeister",version:VERSION,copyright:COPYRIGHT,exportDate:new Date().toISOString(),exportDateFr:new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})},dm_profile:profile,dm_sm2:sm2};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`DeutschMeister_${profile.prenom||"backup"}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
    setExportDone(true);setTimeout(()=>setExportDone(false),4000);
  },[profile,sm2]);

  const openFile=useCallback(()=>fileRef.current?.click(),[]);
  const onFile=useCallback((e)=>{
    const f=e.target.files?.[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.__meta||d.__meta.app!=="DeutschMeister"){setImportErr("❌ Fichier invalide");return;}
        setImportData(d);setImportErr("");setImportPhase("confirm");
      }catch{setImportErr("❌ Fichier corrompu");}
    };
    reader.readAsText(f);e.target.value="";
  },[]);

  const doImport=useCallback((onRestored)=>{
    if(!importData)return;
    if(importData.dm_profile)onRestored(importData.dm_profile,importData.dm_sm2||{});
    setImportPhase("success");
  },[importData]);

  const cancelImport=useCallback(()=>{setImportPhase("idle");setImportData(null);setImportErr("");},[]);
  return{exportDone,importErr,importData,importPhase,fileRef,doExport,openFile,onFile,doImport,cancelImport};
}

// ── ROOT APP ──────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(null);
  const [screen,setScreen]=useState("home");
  const [sm2,setSm2]=useState({});

  useEffect(()=>{
    try{
      const p=localStorage.getItem("dm_profile");
      const s=localStorage.getItem("dm_sm2");
      if(p)setProfile(JSON.parse(p));
      if(s)setSm2(JSON.parse(s));
    }catch{}
  },[]);

  const saveProfile=p=>{
    setProfile(p);
    try{localStorage.setItem("dm_profile",JSON.stringify(p));}catch{}
  };

  if(!profile) return React.createElement('div',{style:{width:"100%",height:"100%",background:C.bg}},
    React.createElement(Onboarding,{onComplete:saveProfile}));

  const NAV=[

      React.createElement(ModulePage,{id:screen,profile,onBack:()=>setScreen("home")})),
    // Bottom nav
